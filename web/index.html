<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Shell</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --border: #2a2a2a;
  --text: #e0e0e0;
  --text-dim: #888;
  --accent: #4ade80;
  --error: #ef4444;
}

body {
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

header h1 {
  font-size: 18px;
  font-weight: 600;
  color: var(--accent);
}

header .status {
  font-size: 12px;
  color: var(--text-dim);
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.msg {
  max-width: 75%;
  padding: 12px 16px;
  border-radius: 12px;
  line-height: 1.6;
  font-size: 14px;
  white-space: pre-wrap;
  word-break: break-word;
}

.msg.user {
  align-self: flex-end;
  background: #1a3a1a;
  border: 1px solid #2a4a2a;
}

.msg.ai {
  align-self: flex-start;
  background: var(--surface);
  border: 1px solid var(--border);
}

.msg.system {
  align-self: center;
  color: var(--text-dim);
  font-size: 12px;
  padding: 4px 12px;
}

#input-area {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 12px;
  align-items: flex-end;
}

#input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  resize: none;
  outline: none;
  min-height: 44px;
  max-height: 120px;
  transition: border-color 0.2s;
}

#input:focus { border-color: var(--accent); }
#input::placeholder { color: var(--text-dim); }

#send {
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 8px;
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  white-space: nowrap;
}

#send:hover { opacity: 0.85; }
#send:disabled { opacity: 0.4; cursor: not-allowed; }

#self-update-btn, #errors-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  cursor: pointer;
  font-size: 16px;
  margin-left: 8px;
  transition: border-color 0.2s;
}
#self-update-btn:hover, #errors-btn:hover { border-color: var(--accent); }
#self-update-btn:disabled, #errors-btn:disabled { opacity: 0.4; cursor: not-allowed; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.typing::after {
  content: '●';
  color: var(--accent);
  animation: blink 1s infinite;
  margin-left: 2px;
}
</style>
</head>
<body>

<header>
  <h1>⚡ AI Shell</h1>
  <span class="status">本地运行 · txt即编程</span>
  <button id="self-update-btn" title="自我更新" onclick="selfUpdate()">🔄</button>
  <button id="errors-btn" title="查看错误日志" onclick="showErrors()">📋</button>
</header>

<div id="chat">
  <div class="msg system">输入需求，AI 自动执行 · Ctrl+Enter 换行</div>
</div>

<div id="input-area">
  <textarea id="input" placeholder="输入你的需求..." rows="1"></textarea>
  <button id="send">发送</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');

let isStreaming = false;

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

function send() {
  const text = input.value.trim();
  if (!text || isStreaming) return;

  addMsg(text, 'user');
  input.value = '';
  input.style.height = 'auto';
  input.disabled = true;
  sendBtn.disabled = true;
  isStreaming = true;

  const aiMsg = addMsg('', 'ai');
  aiMsg.classList.add('typing');

  fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: text }),
  }).then(resp => {
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    function read() {
      reader.read().then(({ done, value }) => {
        if (done) { finish(); return; }

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6);
          if (data === '[DONE]') { finish(); return; }
          try {
            const parsed = JSON.parse(data);
            if (parsed.error) {
              aiMsg.textContent = '❌ ' + parsed.error;
              finish();
              return;
            }
            if (parsed.content) {
              aiMsg.textContent += parsed.content;
              chat.scrollTop = chat.scrollHeight;
            }
          } catch (e) {}
        }
        read();
      });
    }
    read();
  }).catch(err => {
    aiMsg.textContent = '❌ 连接失败: ' + err.message;
    finish();
  });

  function finish() {
    aiMsg.classList.remove('typing');
    input.disabled = false;
    sendBtn.disabled = false;
    isStreaming = false;
    input.focus();
  }
}

function addMsg(text, role) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

sendBtn.addEventListener('click', send);
input.focus();

function selfUpdate() {
  if (isStreaming) return;
  isStreaming = true;
  sendBtn.disabled = true;
  input.disabled = true;
  const btn = document.getElementById('self-update-btn');
  btn.disabled = true;
  document.getElementById('errors-btn').disabled = true;

  addMsg('🔍 触发自我更新...', 'system');

  fetch('/api/self-update', { method: 'POST' }).then(resp => {
    const aiMsg = addMsg('', 'ai');
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    function read() {
      reader.read().then(({ done, value }) => {
        if (done) { finish(); return; }
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6);
          if (data === '[DONE]') { finish(); return; }
          try {
            const parsed = JSON.parse(data);
            if (parsed.error) { aiMsg.textContent = '❌ ' + parsed.error; finish(); return; }
            if (parsed.content) {
              aiMsg.textContent += parsed.content;
              chat.scrollTop = chat.scrollHeight;
            }
          } catch (e) {}
        }
        read();
      });
    }
    read();
  }).catch(err => {
    addMsg('❌ 自我更新失败: ' + err.message, 'system');
    finish();
  });

  function finish() {
    isStreaming = false;
    sendBtn.disabled = false;
    input.disabled = false;
    btn.disabled = false;
    document.getElementById('errors-btn').disabled = false;
    input.focus();
  }
}

async function showErrors() {
  try {
    const resp = await fetch('/api/errors');
    const data = await resp.json();
    const stats = data.stats;
    let text = '📋 错误日志总览\n';
    text += '总计: ' + stats.total + ' 条\n';
    for (const [type, count] of Object.entries(stats.by_type)) {
      text += '  - ' + type + ': ' + count + '\n';
    }
    if (data.logs && data.logs.length > 0) {
      text += '\n最近 ' + data.logs.length + ' 条:\n';
      for (const entry of data.logs.slice(-5)) {
        text += '  [' + entry.type + '] ' + (entry.error || entry.user_input || '').substring(0, 60) + '\n';
      }
    }
    addMsg(text, 'system');
  } catch (err) {
    addMsg('❌ 获取错误日志失败: ' + err.message, 'system');
  }
}
</script>

</body>
</html>
