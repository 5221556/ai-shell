server:
  host: "127.0.0.1"
  port: 18080

chat_ai:
  base_url: "https://api.deepseek.com/v1"
  api_key: "${DEEPSEEK_API_KEY}"
  model: "deepseek-v4-flash"
  temperature: 0.7
  max_tokens: 16384

tool_ai:
  base_url: "https://api.deepseek.com/v1"
  api_key: "${DEEPSEEK_API_KEY}"
  model: "deepseek-v4-flash"
  temperature: 0.1
  max_tokens: 65536

context:
  max_active: 20

self_update:
  max_log_entries: 100
  auto_backup: true
  test_timeout: 30

tools:
  read:
    allowed_dirs: ["/home", "/tmp", "."]
  write:
    allowed_dirs: ["/tmp", "./workspace"]
  exec:
    timeout: 30






